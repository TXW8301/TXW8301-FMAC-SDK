name: Release Firmware

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      cdk_auto_fetch:
        description: 'Set to 1 to auto-download the CDK from vendor FTP'
        required: false
        default: '0'
      cdk_ftp_url:
        description: 'CDK FTP URL to download from when auto-fetching'
        required: false
        default: 'ftp://183.47.14.74/upload/cdk-windows-V2.8.8-20210621-1740.zip'
      cdk_ftp_user:
        description: 'FTP username for CDK download (public vendor credential)'
        required: false
        default: 'txguest'
      cdk_ftp_pass:
        description: 'FTP password for CDK download (public vendor credential)'
        required: false
        default: 'txguest'
      cdk_sha256:
        description: 'Optional SHA256 for CDK archive verification'
        required: false
        default: 'f3b19310c21bfb9597d9ff22f71284bbb880841355a370ba726783130f18993d'
      release_tag:
        description: 'Release tag / version name (defaults to firmware version)'
        required: false
        default: 'TXW8301_FMAC-v2.4.1.5-40938'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, linux, n305-ubuntu]
    steps:
      - name: Clean root-owned build artifacts from previous run
        run: |
          # Docker containers run as root, leaving root-owned files that the runner
          # user cannot delete. Use Docker to clean them before checkout.
          if [ -d "${{ github.workspace }}" ]; then
            docker run --rm \
              -v "${{ github.workspace }}:/ws" \
              alpine:latest \
              sh -c "rm -rf /ws/project/build /ws/project/Lst /ws/project/Obj /ws/cdk" || true
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup QEMU (for buildx emulation)
        uses: docker/setup-qemu-action@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Locate or download CDK (optional)
        id: cdk
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}"
          echo "Looking for repo-local CDK under ./cdk/..."
          CDK_DIR=$(ls -d cdk/cdk-windows-* 2>/dev/null | tail -n1 || true)
          if [ -n "$CDK_DIR" ]; then
            echo "Found CDK at $CDK_DIR"
            echo "cdk_dir=$CDK_DIR" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.cdk_auto_fetch }}" = "1" ]; then
            echo "Attempting to download CDK from ${{ github.event.inputs.cdk_ftp_url }}"
            mkdir -p cdk
            FTP_USER="${{ github.event.inputs.cdk_ftp_user || secrets.CDK_FTP_USER || 'txguest' }}"
            FTP_PASS="${{ github.event.inputs.cdk_ftp_pass || secrets.CDK_FTP_PASS || 'txguest' }}"
            curl -u "${FTP_USER}:${FTP_PASS}" -L -o cdk/cdk.zip "${{ github.event.inputs.cdk_ftp_url }}"
            unzip -q cdk/cdk.zip -d cdk
            CDK_DIR=$(ls -d cdk/cdk-windows-* 2>/dev/null | tail -n1 || true)
            if [ -n "$CDK_DIR" ]; then
              echo "cdk_dir=$CDK_DIR" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "cdk_dir=" >> $GITHUB_OUTPUT
            echo "Failed to extract CDK" >&2
            exit 1
          fi
          echo "No CDK found and auto-fetch not requested; provide CDK in ./cdk or run workflow with cdk_auto_fetch=1" >&2
          echo "cdk_dir=" >> $GITHUB_OUTPUT
          exit 1

      - name: Build Docker image (with CDK if available)
        env:
          IMAGE_TAG: txw8301-fmac-sdk:${{ github.sha }}
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}"
          docker buildx create --use || true
          if [ -n "${{ steps.cdk.outputs.cdk_dir }}" ]; then
            echo "Building image with CDK from: ${{ steps.cdk.outputs.cdk_dir }}"
            docker buildx build --load --platform linux/amd64 --build-context "cdk-installer=${{ steps.cdk.outputs.cdk_dir }}" -f docker/Dockerfile -t "${IMAGE_TAG}" "${{ github.workspace }}"
          else
            echo "Building image without CDK build-context (CDK must be embedded or provided)" >&2
            docker buildx build --load --platform linux/amd64 -f docker/Dockerfile -t "${IMAGE_TAG}" "${{ github.workspace }}"
          fi

      - name: Run container build pipeline
        env:
          IMAGE_TAG: txw8301-fmac-sdk:${{ github.sha }}
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}"
          # Run the image's default entrypoint (container-build.sh) with the repository mounted
          docker run --rm -v "${{ github.workspace }}:/work/fmac:z" -e PROJECT_ROOT=/work/fmac -e PROJECT_DIR=/work/fmac/project -e SKIP_PACKAGING=0 "${IMAGE_TAG}"

      - name: Locate built firmware artifact
        id: find_artifact
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}"
          ART=$(find project/build -type f -name 'txw8301.bin' | sort | tail -n1 || true)
          if [ -z "$ART" ]; then
            echo "No txw8301.bin found in project/build" >&2
            exit 1
          fi
          echo "artifact_path=$ART" >> $GITHUB_OUTPUT

      - name: Create or update GitHub release and upload firmware
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # jq must be pre-installed on the self-hosted runner (see README / runner setup)
          command -v jq >/dev/null 2>&1 || { echo "jq not found; run: sudo apt-get install -y jq on the runner machine" >&2; exit 1; }

          TAG="${{ github.event.inputs.release_tag || github.ref_name || github.sha }}"
          echo "Using release tag: $TAG"
          API_BASE="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          RELEASES_API="${API_BASE}/releases"
          GET_BY_TAG="${RELEASES_API}/tags/${TAG}"

          echo "Checking for existing release..."
          GET_RESP=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "$GET_BY_TAG")
          RELEASE_ID=$(echo "$GET_RESP" | jq -r '.id // empty')
          if [ -n "$RELEASE_ID" ]; then
            echo "Found existing release id=$RELEASE_ID"
            UPLOAD_URL=$(echo "$GET_RESP" | jq -r '.upload_url')
            HTML_URL=$(echo "$GET_RESP" | jq -r '.html_url')
          else
            echo "No existing release; creating new release for $TAG"
            BODY=$(jq -n --arg tag "$TAG" --arg body "Automated build for $TAG" '{tag_name:$tag, name:$tag, body:$body, draft:false, prerelease:false}')
            CREATE_RESP=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" -H "Content-Type: application/json" -d "$BODY" "${RELEASES_API}")
            RELEASE_ID=$(echo "$CREATE_RESP" | jq -r '.id // empty')
            if [ -z "$RELEASE_ID" ]; then
              echo "Failed to create release: $CREATE_RESP" >&2
              exit 1
            fi
            UPLOAD_URL=$(echo "$CREATE_RESP" | jq -r '.upload_url')
            HTML_URL=$(echo "$CREATE_RESP" | jq -r '.html_url')
          fi
          UPLOAD_URL=${UPLOAD_URL%\{*}

          ART="${{ steps.find_artifact.outputs.artifact_path }}"
          ASSET_NAME=$(basename "$ART")
          echo "Preparing to upload $ART as $ASSET_NAME to release $RELEASE_ID ($HTML_URL)"

          # Remove existing asset with same name if present
          ASSETS_API="${RELEASES_API}/${RELEASE_ID}/assets"
          EXISTING_ASSET_ID=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "$ASSETS_API" | jq -r --arg name "$ASSET_NAME" '.[] | select(.name==$name) | .id' | head -n1 || true)
          if [ -n "$EXISTING_ASSET_ID" ]; then
            echo "Deleting existing asset id=$EXISTING_ASSET_ID"
            curl -s -X DELETE -H "Authorization: token ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "${API_BASE}/releases/assets/${EXISTING_ASSET_ID}"
          fi

          echo "Uploading $ASSET_NAME..."
          UPLOAD_RESP=$(curl -s -X POST -H "Authorization: token ${GITHUB_TOKEN}" -H "Content-Type: application/octet-stream" --data-binary @"$ART" "${UPLOAD_URL}?name=${ASSET_NAME}")
          echo "Upload response:"
          echo "$UPLOAD_RESP" | jq -r '.' || true
          echo "Release URL: $HTML_URL"
